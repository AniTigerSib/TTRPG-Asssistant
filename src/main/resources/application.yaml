spring:
    datasource:
        url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ttrpg_db}
        username: ${DB_USER:postgres}
        password: ${DB_PASSWORD:postgres}
        hikari:
            connection-timeout: 30000
            maximum-pool-size: 10

    jpa:
        hibernate:
            ddl-auto: validate
        open-in-view: false

    application:
        name: service
