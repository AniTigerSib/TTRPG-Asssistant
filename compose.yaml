services:
  postgres:
    image: postgres:17-alpine
    env_file:
      - docker/database.env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - docker/database.env
    depends_on:
      postgres:
        condition: service_healthy
    # environment:
    #   DB_HOST: postgres
    #   DB_PORT: 5432
    ports:
      - "8080:8080"

volumes:
  postgres_data:
