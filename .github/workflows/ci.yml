name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on:
      - self-hosted
      - ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Prepare log directory
        run: mkdir -p .ci-logs/unit

      - name: Run unit tests
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew clean test 2>&1 | tee .ci-logs/unit/unit-tests.log

      - name: Upload unit test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-logs
          path: .ci-logs/unit/**
          if-no-files-found: warn
          retention-days: 14

  integration-tests:
    name: Integration Tests
    runs-on:
      - self-hosted
      - ci
    needs:
      - unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Prepare log directory
        run: mkdir -p .ci-logs/integration

      - name: Run integration tests
        shell: bash
        env:
          COMPOSE_PROJECT_NAME: ttrpg-service-ci
          INTEGRATION_BASE_URL: http://localhost:8080
          LOG_DIR: .ci-logs/integration
          DOCKER_SUDO: "true"
        run: |
          chmod +x gradlew
          bash scripts/run-integration-tests.sh

      - name: Upload integration logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: .ci-logs/integration/**
          if-no-files-found: warn
          retention-days: 14
